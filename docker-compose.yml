services:
  shopware:
    image: dockware/dev:6.6.8.2
    container_name: shopware-test
    ports:
      - "8080:80"
    environment:
      - XDEBUG_ENABLED=0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/_info/config"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
